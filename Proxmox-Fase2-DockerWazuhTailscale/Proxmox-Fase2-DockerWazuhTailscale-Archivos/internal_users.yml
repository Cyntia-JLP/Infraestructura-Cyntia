---
# OpenSearch Security - Internal Users Database
# Proyecto Cyntia - SOC/SIEM para PYMEs
#
# Modificaciones respecto a la configuración por defecto:
# - Usuario 'admin': hash sustituido por valor inválido para deshabilitar el acceso.
#   reserved: false permite que este cambio se aplique al reiniciar el stack.
# - Usuario 'cyntia': creado desde la interfaz web del dashboard con rol admin.
#   Es el único usuario operativo del SOC.
# - Eliminados usuarios de demo innecesarios (kibanaro, logstash, readall, snapshotrestore
#   se mantienen por compatibilidad interna pero sin uso operativo).
#
# IMPORTANTE: los hashes de contraseñas usan bcrypt con cost factor 12.
# Para generar un nuevo hash: python3 -c "import bcrypt; print(bcrypt.hashpw(b'CONTRASEÑA', bcrypt.gensalt(12)).decode())"

_meta:
  type: "internalusers"
  config_version: 2

# Usuario admin deshabilitado - hash inválido, no se puede autenticar
admin:
  hash: "$2y$12$XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
  reserved: false
  backend_roles:
  - "admin"
  description: "Admin deshabilitado - usar cuenta cyntia"

# Usuario operativo del SOC Cyntia
# Contraseña gestionada desde la interfaz web de OpenSearch Security
cyntia:
  hash: "$2b$12$oc5O7uTmlGO/hSWD7zNnPe3tkKb7psVZvvgg0CqLA/1nhllmX077G"
  reserved: false
  backend_roles:
  - "admin"
  description: "Usuario operativo del SOC Cyntia"

# Usuario interno para comunicación dashboard → indexer (NO modificar)
kibanaserver:
  hash: "$2a$12$4AcgAt3xwOWadA5s5blL6ev39OXDNhmOesEoo33eZtrq2N0YrU3H."
  reserved: true
  description: "Usuario interno kibana - solo comunicación interna"

# Usuarios de demo mantenidos por compatibilidad
logstash:
  hash: "$2a$12$u1ShR4l4uBS3Uv59Pa2y5.1uQuZBrZtmNfqB3iM/.jL0XoV9sghS2"
  reserved: false
  backend_roles:
  - "logstash"
  description: "Demo logstash user"

readall:
  hash: "$2a$12$ae4ycwzwvLtZxwZ82RmiEunBbIPiAmGZduBAjKN0TXdwQFtCwARz2"
  reserved: false
  backend_roles:
  - "readall"
  description: "Demo readall user"

snapshotrestore:
  hash: "$2y$12$DpwmetHKwgYnorbgdvORCenv4NAK8cPUg8AI6pxLCuWf/ALc0.v7W"
  reserved: false
  backend_roles:
  - "snapshotrestore"
  description: "Demo snapshotrestore user"
