# /etc/pve/lxc/101.conf — lxc-soc-core
# Contenedor Ubuntu 22.04 que aloja el stack SOC completo (Wazuh + Docker)
# Requiere configuración especial para permitir Docker dentro del LXC

arch: amd64
cores: 2
features: nesting=1
hostname: lxc-soc-core
memory: 3072
nameserver: 192.168.20.2
net0: name=eth0,bridge=vmbr0,gw=192.168.20.1,hwaddr=BC:24:11:C3:E1:C5,ip=192.168.20.3/24,tag=20,type=veth
ostype: ubuntu
rootfs: local-lvm:vm-101-disk-1,size=60G
swap: 512
unprivileged: 1
onboot: 1

# Configuración necesaria para ejecutar Docker dentro del LXC no privilegiado
lxc.apparmor.profile: unconfined
lxc.cgroup2.devices.allow: a
lxc.cap.drop:
